name: Camerae
options:
  bundleIdPrefix: com.espindola
  developmentLanguage: pt-BR
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "8.4.0"
    CURRENT_PROJECT_VERSION: "22"
targets:
  CameraeCore:
    type: framework
    platform: iOS
    sources:
      - path: CameraeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.espindola.camerae.core
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
  CameraeMedia:
    type: framework
    platform: iOS
    sources:
      - path: CameraeMedia
    dependencies:
      - target: CameraeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.espindola.camerae.media
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
  CameraeVision:
    type: framework
    platform: iOS
    sources:
      - path: CameraeVision
        excludes:
          - include
      - path: CameraeVision/include
        headerVisibility: public
      - path: ../vision/src
      - path: ../vision/include
        headerVisibility: project
    dependencies:
      - framework: Frameworks/opencv2.xcframework
        embed: false
      - sdk: CoreVideo.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.espindola.camerae.vision
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        CLANG_CXX_LANGUAGE_STANDARD: c++17
        CLANG_WARN_DOCUMENTATION_COMMENTS: NO
        CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: NO
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/CameraeVision/include
          - $(SRCROOT)/../vision/include
        OTHER_LDFLAGS: >-
          $(inherited) -lz
          -framework Accelerate
          -framework CoreGraphics
          -framework CoreVideo
          -framework QuartzCore
          -framework UIKit
  Camerae:
    type: application
    platform: iOS
    sources:
      - path: Camerae
        excludes:
          - DeepSNRDenoiser.swift
      - path: Camerae/GoogleService-Info.plist
        buildPhase: resources
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    info:
      path: Camerae/Info.plist
      properties:
        CFBundleDisplayName: Camerae
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        FirebaseCrashlyticsCollectionEnabled: false
        CameraeCrashlyticsCollectionEnabled: $(CAMERAE_CRASHLYTICS_COLLECTION_ENABLED)
        CameraeReleaseChannel: $(CAMERAE_RELEASE_CHANNEL)
        UIAppFonts:
          - Outfit-Variable.ttf
          - DMMono-Regular.ttf
        UILaunchScreen: {}
        NSCameraUsageDescription: Camerae usa a camera para capturar timelapses e alinhar fotos com uma referencia.
        NSLocationWhenInUseUsageDescription: Camerae usa sua posicao para ajudar a repetir o enquadramento no mesmo local.
        NSLocationTemporaryUsageDescriptionDictionary:
          RepeatableAlignment: Camerae usa localizacao precisa para alinhar capturas repetidas no mesmo ponto.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiredDeviceCapabilities:
          - arm64
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.espindola.camerae
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: Camerae/Camerae-Bridging-Header.h
        OTHER_LDFLAGS: $(inherited) -ObjC
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    dependencies:
      - target: CameraeCore
      - target: CameraeMedia
      - target: CameraeVision
    postBuildScripts:
      - name: Upload Crashlytics Symbols
        basedOnDependencyAnalysis: false
        script: |
          if [ "${CONFIGURATION}" = "Release" ]; then
            "${PODS_ROOT}/FirebaseCrashlytics/run"
          else
            echo "Skipping Crashlytics symbol upload for ${CONFIGURATION}"
          fi
        inputFiles:
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Resources/DWARF/${TARGET_NAME}
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Info.plist
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/GoogleService-Info.plist
          - $(TARGET_BUILD_DIR)/$(EXECUTABLE_PATH)
  CameraeCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CameraeCoreTests
    dependencies:
      - target: CameraeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.espindola.camerae.core-tests
        GENERATE_INFOPLIST_FILE: YES
  CameraeMediaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CameraeMediaTests
    dependencies:
      - target: CameraeMedia
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.espindola.camerae.media-tests
        GENERATE_INFOPLIST_FILE: YES
  CameraeVisionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CameraeVisionTests
    dependencies:
      - target: CameraeVision
      - sdk: CoreVideo.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.espindola.camerae.vision-tests
        GENERATE_INFOPLIST_FILE: YES
        CLANG_CXX_LANGUAGE_STANDARD: c++17
  CameraeIntegrationTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: Camerae
    sources:
      - path: CameraeIntegrationTests
    dependencies:
      - target: Camerae
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.espindola.camerae.integration-tests
        GENERATE_INFOPLIST_FILE: YES
  CameraePerformanceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CameraePerformanceTests
    dependencies:
      - target: CameraeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.espindola.camerae.performance-tests
        GENERATE_INFOPLIST_FILE: YES
  CameraeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CameraeUITests
    dependencies:
      - target: Camerae
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.espindola.camerae.ui-tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Camerae:
    build:
      targets:
        Camerae: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CameraeCoreTests
        - CameraeMediaTests
        - CameraeVisionTests
        - CameraeIntegrationTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  CameraePerformance:
    build:
      targets:
        CameraeCore: all
    test:
      config: Debug
      targets:
        - CameraePerformanceTests
  CameraeUI:
    build:
      targets:
        Camerae: all
    test:
      config: Debug
      targets:
        - CameraeUITests
