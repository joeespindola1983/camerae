name: iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build and test Camerae
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Cache pinned OpenCV XCFramework
        id: opencv-cache
        uses: actions/cache@v4
        with:
          path: ios/Frameworks/opencv2.xcframework
          key: opencv-ios-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('ios/Frameworks/opencv-xcframework.json', 'ios/scripts/build-opencv-xcframework.sh') }}

      - name: Build pinned OpenCV XCFramework
        if: steps.opencv-cache.outputs.cache-hit != 'true'
        working-directory: ios
        run: ./scripts/build-opencv-xcframework.sh

      - name: Verify pinned OpenCV XCFramework
        working-directory: ios
        run: ./scripts/verify-opencv-xcframework.sh

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Check architecture boundaries
        working-directory: ios
        run: ./scripts/check-architecture.sh

      - name: Run Swift component and integration tests
        working-directory: ios
        run: |
          xcodebuild \
            -workspace Camerae.xcworkspace \
            -scheme Camerae \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Build
        working-directory: ios
        run: |
          xcodebuild \
            -workspace Camerae.xcworkspace \
            -scheme Camerae \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

  processing-tests:
    name: Test C++ processing core
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OpenCV
        run: sudo apt-get update && sudo apt-get install -y libopencv-dev

      - name: Configure
        run: cmake -S processing -B .build/processing -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build .build/processing --parallel 2

      - name: Test
        run: ctest --test-dir .build/processing --output-on-failure
